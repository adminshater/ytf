<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>(╯°□°）╯︵ ┻━┻ 缓存不可用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c10;
            overflow: hidden;
            font-family: system-ui, 'Segoe UI', 'SF Pro Text', 'Roboto', sans-serif;
        }

        .video-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            cursor: pointer;
        }

        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            background: rgba(20, 22, 27, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            transition: opacity 0.3s ease;
            pointer-events: auto;
        }

        .fullscreen-mode .controls-panel {
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .fullscreen-mode .controls-panel:hover,
        .fullscreen-mode .controls-panel:focus-within {
            opacity: 1;
            pointer-events: auto;
        }

        button, select {
            background: rgba(0, 0, 0, 0.75);
            border: none;
            color: #f0f0f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            font-family: inherit;
            border: 1px solid rgba(255,255,255,0.15);
        }

        button:hover:not(:disabled), select:hover {
            background: #2c2f36;
            transform: scale(0.97);
            border-color: rgba(255,255,255,0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        select {
            background: #1e2127;
            cursor: pointer;
            appearance: none;
            padding-right: 32px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            min-width: 120px;
        }

        .status-bar {
            background: #0f1117cc;
            border-radius: 40px;
            padding: 5px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            color: #b9f6ca;
            backdrop-filter: blur(4px);
            border: 1px solid #2a2e3a;
        }

        .progress {
            width: 140px;
            height: 6px;
            background: #2a2f3a;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3eff9e, #00d8ff);
            border-radius: 6px;
            transition: width 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .speed-badge {
            background: #2c2f36;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            color: #aaf0c0;
        }

        #percentText {
            font-weight: 600;
            min-width: 45px;
        }

        .mute-btn.unmuted {
            background: #2a7f3e;
        }
        .mute-btn.muted-style {
            background: #a03e3e;
        }

        .toast-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 10000;
            backdrop-filter: blur(8px);
            animation: slideDown 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast-success {
            background: rgba(46, 125, 50, 0.95);
            color: white;
        }

        .toast-error {
            background: rgba(220, 53, 69, 0.95);
            color: white;
        }

        .toast-info {
            background: rgba(33, 150, 243, 0.95);
            color: white;
        }

        @keyframes slideDown {
            from {
                top: -50px;
                opacity: 0;
            }
            to {
                top: 20px;
                opacity: 1;
            }
        }

        @media (max-width: 860px) {
            .controls-panel {
                padding: 8px 12px;
                gap: 8px;
                border-radius: 32px;
            }
            button, select {
                padding: 6px 12px;
                font-size: 12px;
            }
            .status-bar {
                padding: 3px 12px;
                gap: 6px;
            }
            .progress {
                width: 90px;
            }
            select {
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
<div class="video-wrapper" id="videoWrapper">
    <video id="myVideo" autoplay muted loop playsinline preload="metadata"></video>
    <div class="controls-panel" id="controlsPanel">
        <button id="fullscreenBtn" class="fullscreen-btn">🖥️ 全屏</button>
        <button id="toggleMuteBtn" class="mute-btn unmuted">🔊 静音</button>
        
        <select id="videoSelector">
            <option value="video1">🎬 视频1</option>
            <option value="video2">🎬 视频2</option>
            <option value="video3">🎬 视频3</option>
            <option value="video4">🎬 视频4</option>
            <option value="video5">🎬 视频5</option>
            <option value="video6">🎬 视频6</option>
        </select>
        
        <button id="cacheBtn">💾 缓存视频</button>
        
        <div class="status-bar">
            <span>📡</span>
            <span id="statusText">未缓存</span>
            <div class="progress">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <span id="percentText">0%</span>
            <span id="speedText" class="speed-badge">0 KB/s</span>
        </div>
    </div>
</div>

<script>
    (function(){
        // DOM 元素
        const video = document.getElementById("myVideo");
        const fullscreenBtn = document.getElementById("fullscreenBtn");
        const toggleMuteBtn = document.getElementById("toggleMuteBtn");
        const selector = document.getElementById("videoSelector");
        const wrapper = document.getElementById("videoWrapper");
        const cacheBtn = document.getElementById("cacheBtn");
        const statusText = document.getElementById("statusText");
        const progressFill = document.getElementById("progressFill");
        const percentText = document.getElementById("percentText");
        const speedText = document.getElementById("speedText");
        
        // 状态变量
        let isFullscreen = false;
        let isCaching = false;
        let currentVideoId = "video1";
        let currentVideoUrl = "";
        let currentBlobUrl = null;
        let abortController = null;
        let currentPlaybackMode = "online";
        
        // 视频配置 (6个视频)
        const videos = {
            video1: { url: "https://adminshater.github.io/ytf/1.mp4", name: "视频1" },
            video2: { url: "https://adminshater.github.io/ytf/2.mp4", name: "视频2" },
            video3: { url: "https://adminshater.github.io/ytf/3.mp4", name: "视频3" },
            video4: { url: "https://adminshater.github.io/ytf/4.mp4", name: "视频4" },
            video5: { url: "https://adminshater.github.io/ytf/5.mp4", name: "视频5" },
            video6: { url: "https://adminshater.github.io/ytf/6.mp4", name: "视频6" }
        };
        
        // CORS 代理列表 (自动降级)
        const CORS_PROXIES = [
            null,  // 直接请求
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url=',
            'https://cors-anywhere.herokuapp.com/'
        ];
        
        // 显示提示消息
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast-message toast-${type}`;
            toast.textContent = type === 'success' ? `✅ ${message}` : (type === 'error' ? `⚠️ ${message}` : `ℹ️ ${message}`);
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // ---------- IndexedDB 缓存模块 ----------
        const DB_NAME = "MP4Cache_Simple";
        let db = null;
        
        function initDB() {
            return new Promise((resolve, reject) => {
                if (db && db.name === DB_NAME) {
                    resolve(db);
                    return;
                }
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (e) => {
                    const dbInstance = e.target.result;
                    if (!dbInstance.objectStoreNames.contains("videos")) {
                        dbInstance.createObjectStore("videos", { keyPath: "id" });
                    }
                };
            });
        }
        
        async function getCachedBlob(videoId) {
            await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction(["videos"], "readonly");
                const store = tx.objectStore("videos");
                const request = store.get(videoId);
                request.onsuccess = () => resolve(request.result?.blob || null);
                request.onerror = () => resolve(null);
            });
        }
        
        async function saveCachedBlob(videoId, blob) {
            await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(["videos"], "readwrite");
                const store = tx.objectStore("videos");
                const request = store.put({ id: videoId, blob, timestamp: Date.now() });
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }
        
        async function deleteCache(videoId) {
            await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction(["videos"], "readwrite");
                const store = tx.objectStore("videos");
                const request = store.delete(videoId);
                request.onsuccess = () => resolve();
                request.onerror = () => resolve();
            });
        }
        
        // 切换到缓存视频播放 (保留播放进度)
        async function switchToCachedPlayback(videoId, cachedBlob) {
            if (!cachedBlob) {
                cachedBlob = await getCachedBlob(videoId);
            }
            if (!cachedBlob) return false;
            
            try {
                const currentTime = video.currentTime;
                const wasPlaying = !video.paused;
                
                if (currentBlobUrl) {
                    URL.revokeObjectURL(currentBlobUrl);
                }
                currentBlobUrl = URL.createObjectURL(cachedBlob);
                
                video.src = currentBlobUrl;
                currentPlaybackMode = "cached";
                
                await new Promise((resolve) => {
                    video.addEventListener('loadedmetadata', () => {
                        if (currentTime > 0 && currentTime < video.duration) {
                            video.currentTime = currentTime;
                        }
                        if (wasPlaying) {
                            video.play().catch(e => console.log("恢复播放失败"));
                        }
                        resolve();
                    }, { once: true });
                });
                
                statusText.innerText = "✓ 已缓存";
                progressFill.style.width = "100%";
                percentText.innerText = "100%";
                
                return true;
            } catch (error) {
                console.error("切换到缓存失败:", error);
                return false;
            }
        }
        
        // ---------- 核心播放逻辑 ----------
        async function playVideo(videoId, forceNetwork = false) {
            if (isCaching) {
                const userConfirm = confirm("缓存任务进行中，切换视频会中断缓存。确定切换吗？");
                if (!userConfirm) {
                    selector.value = currentVideoId;
                    return;
                } else {
                    if (abortController) {
                        abortController.abort();
                        abortController = null;
                    }
                    isCaching = false;
                    if (cacheBtn) cacheBtn.disabled = false;
                    cacheBtn.textContent = "💾 缓存视频";
                }
            }
            
            currentVideoId = videoId;
            currentVideoUrl = videos[videoId].url;
            
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
            
            const cachedBlob = await getCachedBlob(videoId);
            if (cachedBlob && !forceNetwork) {
                currentBlobUrl = URL.createObjectURL(cachedBlob);
                video.src = currentBlobUrl;
                currentPlaybackMode = "cached";
                statusText.innerText = "✓ 已缓存";
                progressFill.style.width = "100%";
                percentText.innerText = "100%";
                speedText.innerText = "本地";
                video.load();
                video.play().catch(e => console.log("自动播放受限", e));
                return;
            }
            
            video.src = currentVideoUrl;
            currentPlaybackMode = "online";
            statusText.innerText = "🌐 在线播放";
            progressFill.style.width = "0%";
            percentText.innerText = "0%";
            speedText.innerText = "0 KB/s";
            video.load();
            video.play().catch(e => console.log("需要用户手势", e));
        }
        
        // 带代理降级的 fetch
        async function fetchWithFallback(url, signal) {
            for (let i = 0; i < CORS_PROXIES.length; i++) {
                const proxy = CORS_PROXIES[i];
                try {
                    const fetchUrl = proxy ? proxy + encodeURIComponent(url) : url;
                    const response = await fetch(fetchUrl, { signal, mode: 'cors' });
                    if (response.ok) {
                        if (proxy) console.log(`使用代理 ${i} 成功`);
                        return response;
                    }
                } catch (e) {
                    console.log(`请求方式 ${i} 失败:`, e.message);
                }
            }
            throw new Error("无法获取视频，请检查网络或视频源");
        }
        
        // ---------- 纯缓存功能 (先完整下载，完成后自动切换播放) ----------
        async function startCache() {
            if (isCaching) {
                showToast("已有缓存任务进行中", "error");
                return;
            }
            
            const videoId = currentVideoId;
            const targetUrl = currentVideoUrl;
            const videoName = videos[videoId].name;
            
            const existingBlob = await getCachedBlob(videoId);
            if (existingBlob) {
                const reCache = confirm(`「${videoName}」已缓存 (${(existingBlob.size/1024/1024).toFixed(1)} MB)\n是否重新下载并覆盖？`);
                if (!reCache) return;
                await deleteCache(videoId);
            }
            
            isCaching = true;
            cacheBtn.disabled = true;
            cacheBtn.textContent = "⏳ 下载中...";
            statusText.innerText = "📥 开始下载";
            progressFill.style.width = "0%";
            percentText.innerText = "0%";
            speedText.innerText = "0 KB/s";
            
            abortController = new AbortController();
            let chunks = [];
            let receivedBytes = 0;
            let lastTime = Date.now();
            let lastBytes = 0;
            
            try {
                const timeoutId = setTimeout(() => abortController.abort(), 180000);
                const response = await fetchWithFallback(targetUrl, abortController.signal);
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const contentLength = parseInt(response.headers.get("content-length") || "0");
                const reader = response.body.getReader();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    chunks.push(value);
                    receivedBytes += value.length;
                    
                    if (contentLength > 0) {
                        const percent = (receivedBytes / contentLength * 100).toFixed(1);
                        progressFill.style.width = percent + "%";
                        percentText.innerText = percent + "%";
                        statusText.innerText = `📥 ${percent}%`;
                    } else {
                        const mb = (receivedBytes / 1024 / 1024).toFixed(1);
                        statusText.innerText = `📥 ${mb} MB`;
                        percentText.innerText = `${mb}MB`;
                    }
                    
                    const now = Date.now();
                    if (now - lastTime >= 1000) {
                        const speed = (receivedBytes - lastBytes) / 1024;
                        speedText.innerText = speed.toFixed(1) + " KB/s";
                        lastBytes = receivedBytes;
                        lastTime = now;
                    }
                }
                
                const completeBlob = new Blob(chunks, { type: "video/mp4" });
                await saveCachedBlob(videoId, completeBlob);
                
                statusText.innerText = "✅ 缓存完成";
                progressFill.style.width = "100%";
                percentText.innerText = "100%";
                speedText.innerText = "完成";
                
                showToast(`「${videoName}」缓存成功！(${(completeBlob.size/1024/1024).toFixed(1)} MB)`, "success");
                
                // 等待一下让用户看到完成状态
                await new Promise(r => setTimeout(r, 500));
                
                // ========== 关键：缓存完成后自动切换到缓存视频播放 ==========
                showToast("正在切换到缓存版本...", "info");
                
                const switchSuccess = await switchToCachedPlayback(videoId, completeBlob);
                
                if (switchSuccess) {
                    showToast("已切换到缓存版本，播放更流畅！", "success");
                } else {
                    showToast("缓存已保存，下次播放将自动使用缓存", "info");
                }
                
            } catch (err) {
                console.error("缓存失败:", err);
                let errMsg = "缓存失败";
                if (err.name === 'AbortError') errMsg = "下载超时 (超过180秒)";
                else if (err.message.includes("Failed to fetch")) errMsg = "网络请求失败，可能是跨域限制";
                else errMsg = err.message || "未知错误";
                
                statusText.innerText = "❌ 失败";
                showToast(errMsg, "error");
                
                if (currentVideoId === videoId && currentPlaybackMode === "online") {
                    statusText.innerText = "🌐 在线播放";
                }
            } finally {
                isCaching = false;
                cacheBtn.disabled = false;
                cacheBtn.textContent = "💾 缓存视频";
                abortController = null;
                
                setTimeout(async () => {
                    if (!isCaching && currentVideoId === videoId) {
                        const cached = await getCachedBlob(currentVideoId);
                        if (cached && currentPlaybackMode === "cached") {
                            statusText.innerText = "✓ 已缓存";
                            progressFill.style.width = "100%";
                            percentText.innerText = "100%";
                        } else if (!cached && currentPlaybackMode === "online") {
                            statusText.innerText = "🌐 在线播放";
                        }
                    }
                }, 1000);
            }
        }
        
        // ---------- UI 交互 ----------
        function toggleFullscreen() {
            if (!document.fullscreenElement && !wrapper.webkitFullscreenElement) {
                wrapper.requestFullscreen().catch(err => console.warn(err));
            } else {
                document.exitFullscreen();
            }
        }
        
        function toggleMute() {
            video.muted = !video.muted;
            updateMuteButtonUI();
        }
        
        function updateMuteButtonUI() {
            if (video.muted) {
                toggleMuteBtn.innerHTML = "🔇 取消静音";
                toggleMuteBtn.classList.add("muted-style");
                toggleMuteBtn.classList.remove("unmuted");
            } else {
                toggleMuteBtn.innerHTML = "🔊 静音";
                toggleMuteBtn.classList.remove("muted-style");
                toggleMuteBtn.classList.add("unmuted");
            }
        }
        
        function onFullscreenChange() {
            const isFs = !!document.fullscreenElement || !!wrapper.webkitFullscreenElement;
            isFullscreen = isFs;
            if (isFs) {
                wrapper.classList.add("fullscreen-mode");
                fullscreenBtn.innerHTML = "📱 窗口模式";
            } else {
                wrapper.classList.remove("fullscreen-mode");
                fullscreenBtn.innerHTML = "🖥️ 全屏";
            }
        }
        
        selector.addEventListener("change", async (e) => {
            const newId = e.target.value;
            if (newId === currentVideoId) return;
            await playVideo(newId);
        });
        
        cacheBtn.addEventListener("click", startCache);
        fullscreenBtn.addEventListener("click", toggleFullscreen);
        toggleMuteBtn.addEventListener("click", toggleMute);
        
        document.addEventListener("fullscreenchange", onFullscreenChange);
        document.addEventListener("webkitfullscreenchange", onFullscreenChange);
        
        video.addEventListener("click", () => {
            if (video.muted) {
                video.muted = false;
                updateMuteButtonUI();
            }
        });
        
        // 初始化
        initDB().then(() => {
            playVideo("video1").catch(e => console.warn(e));
            selector.value = "video1";
            currentVideoId = "video1";
            currentVideoUrl = videos.video1.url;
            updateMuteButtonUI();
        }).catch(err => {
            console.error("IndexedDB 不可用，降级为在线模式", err);
            showToast("本地存储不可用，仅支持在线播放", "error");
            playVideo("video1");
            updateMuteButtonUI();
        });
        
        window.addEventListener("beforeunload", () => {
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
            }
        });
        
        video.addEventListener("error", async () => {
            const cached = await getCachedBlob(currentVideoId);
            if (!cached && !video.src.startsWith("blob:")) {
                console.log("视频源加载失败");
            }
        });
        
        const style = document.createElement('style');
        style.textContent = `
            .mute-btn.unmuted { background: #2a7f3e; }
            .mute-btn.muted-style { background: #a03e3e; }
            .fullscreen-btn { background: #2c3e66; }
            button:active { transform: scale(0.96); }
        `;
        document.head.appendChild(style);
    })();
</script>
</body>
</html>
