<!DOCTYPE html>
<html>
<head>
    <title>多功能视频播放器 - 边缓存边播放</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        #videoContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #controls {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9999;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            max-width: calc(100vw - 20px);
        }
        button, select {
            background-color: rgba(255,255,255,0.7);
            border: 1px solid #000;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            min-width: 120px;
            font-size: 14px;
            backdrop-filter: blur(4px);
        }
        button:hover, select:hover {
            background-color: rgba(255,255,255,0.9);
        }
        .fullscreen #controls {
            display: none;
        }
        #cacheStatus {
            background-color: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            border: 1px solid #00ff8844;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        #cacheProgress {
            width: 100px;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            margin-left: 10px;
            overflow: hidden;
            display: inline-block;
        }
        #cacheProgressFill {
            height: 100%;
            width: 0%;
            background-color: #0f0;
            transition: width 0.2s;
        }
        .streaming-badge {
            background-color: #ffc107;
            color: black;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
<div id="videoContainer">
    <video id="myVideo" autoplay muted loop playsinline></video>
    <div id="controls">
        <button id="playButton">取消静音并全屏</button>
        <select id="videoSelector">
            <option value="video1">视频1</option>
            <option value="video2">视频2</option>
            <option value="video3">视频3</option>
        </select>
        <button id="cacheButton" title="开始流式缓存（边看边存）">⬇️ 开始缓存</button>
        <div id="cacheStatus">
            <span id="cacheStatusText">未缓存</span>
            <span id="streamingBadge" class="streaming-badge" style="display: none;">流式缓存中</span>
            <div id="cacheProgress"><div id="cacheProgressFill"></div></div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const video = document.getElementById("myVideo");
        const playButton = document.getElementById("playButton");
        const videoSelector = document.getElementById("videoSelector");
        const videoContainer = document.getElementById("videoContainer");
        const cacheButton = document.getElementById("cacheButton");
        const cacheStatusText = document.getElementById("cacheStatusText");
        const cacheProgressFill = document.getElementById("cacheProgressFill");
        const streamingBadge = document.getElementById("streamingBadge");
        
        let isFullscreen = false;
        let isStreaming = false; // 是否正在流式缓存
        let mediaSource = null;
        let sourceBuffer = null;
        let queue = []; // 存储等待追加的数据块
        let downloadingController = null; // 用于中止下载

        // 视频库配置
        const videoLibrary = {
            video1: {
                mp4: "https://adminshater.github.io/ytf/1.mp4",
                name: "视频1"
            },
            video2: {
                mp4: "https://adminshater.github.io/ytf/2.mp4",
                name: "视频2"
            },
            video3: {
                mp4: "https://adminshater.github.io/ytf/3.mp4",
                name: "视频3"
            }
        };

        // IndexedDB 设置
        const DB_NAME = 'VideoCacheDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'videos';
        let db = null;
        let currentVideoId = 'video1';
        let currentVideoBlob = null; // 存储完整的blob用于最终保存

        // 打开IndexedDB
        function openDB() {
            return new Promise((resolve, reject) => {
                if (db) {
                    resolve(db);
                    return;
                }
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'videoId' });
                    }
                };
            });
        }

        // 获取缓存的视频
        async function getCachedVideo(videoId) {
            await openDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(videoId);
                request.onsuccess = () => resolve(request.result?.blob || null);
                request.onerror = () => reject(request.error);
            });
        }

        // 保存完整视频到缓存
        async function saveCompleteVideo(videoId, blob) {
            await openDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put({ videoId, blob, timestamp: Date.now() });
                request.onsuccess = resolve;
                request.onerror = () => reject(request.error);
            });
        }

        // 检查视频是否已完整缓存
        async function isVideoCached(videoId) {
            const blob = await getCachedVideo(videoId);
            return !!blob;
        }

        // 切换视频
        async function changeVideo(videoId) {
            if (isStreaming) {
                // 如果正在流式缓存，先停止
                stopStreaming();
            }

            currentVideoId = videoId;
            
            // 检查是否有完整缓存
            const cachedBlob = await getCachedVideo(videoId);
            
            if (cachedBlob) {
                // 有完整缓存，直接播放
                const url = URL.createObjectURL(cachedBlob);
                video.src = url;
                cacheStatusText.innerText = '已缓存';
                cacheProgressFill.style.width = '100%';
                streamingBadge.style.display = 'none';
                cacheButton.disabled = false;
                cacheButton.innerText = '⬇️ 重新缓存';
            } else {
                // 没有缓存，播放网络源（但通过MSE支持边下边播）
                cacheStatusText.innerText = '未缓存';
                cacheProgressFill.style.width = '0%';
                streamingBadge.style.display = 'none';
                cacheButton.disabled = false;
                cacheButton.innerText = '⬇️ 开始缓存';
                
                // 直接播放网络视频（不通过MSE，因为MSE需要特殊处理）
                // 为了简化，我们先播放网络视频，等用户点击"开始缓存"时才启用流式缓存
                video.src = videoLibrary[videoId].mp4;
            }
            
            video.load();
            try {
                await video.play();
            } catch (e) {
                console.log("自动播放失败:", e);
            }
        }

        // 停止当前的流式缓存
        function stopStreaming() {
            if (downloadingController) {
                downloadingController.abort();
                downloadingController = null;
            }
            
            if (mediaSource && mediaSource.readyState === 'open') {
                try {
                    mediaSource.endOfStream();
                } catch (e) {
                    console.log('结束MediaSource流时出错:', e);
                }
            }
            
            isStreaming = false;
            streamingBadge.style.display = 'none';
            
            // 清理queue
            queue = [];
        }

        // 开始流式缓存（边下边播）
        async function startStreamingCache() {
            if (isStreaming) {
                stopStreaming();
                return;
            }

            const videoId = currentVideoId;
            const videoUrl = videoLibrary[videoId].mp4;
            
            // 检查是否已有完整缓存
            if (await isVideoCached(videoId)) {
                if (confirm('该视频已完整缓存，是否重新下载？')) {
                    // 可以添加删除旧缓存的逻辑
                } else {
                    return;
                }
            }

            cacheButton.disabled = true;
            cacheButton.innerText = '⏳ 准备中...';
            cacheStatusText.innerText = '连接中...';
            cacheProgressFill.style.width = '0%';
            
            // 收集所有数据块的数组，用于最后保存完整文件
            const chunks = [];
            let receivedLength = 0;
            let totalLength = 0;
            
            // 创建MediaSource
            mediaSource = new MediaSource();
            video.src = URL.createObjectURL(mediaSource);
            
            mediaSource.addEventListener('sourceopen', async () => {
                try {
                    // 确定MIME类型（这里假设都是MP4）
                    const mimeType = 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"';
                    
                    // 如果已经有SourceBuffer，先清理
                    if (sourceBuffer) {
                        if (!sourceBuffer.updating) {
                            mediaSource.removeSourceBuffer(sourceBuffer);
                        }
                    }
                    
                    sourceBuffer = mediaSource.addSourceBuffer(mimeType);
                    sourceBuffer.mode = 'sequence'; // 确保按顺序追加
                    
                    // 处理队列中的数据
                    sourceBuffer.addEventListener('updateend', () => {
                        if (queue.length > 0 && !sourceBuffer.updating) {
                            const nextChunk = queue.shift();
                            sourceBuffer.appendBuffer(nextChunk);
                        }
                    });
                    
                    // 开始下载
                    downloadingController = new AbortController();
                    const signal = downloadingController.signal;
                    
                    try {
                        const response = await fetch(videoUrl, { signal });
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        
                        totalLength = parseInt(response.headers.get('content-length') || '0');
                        
                        const reader = response.body.getReader();
                        
                        isStreaming = true;
                        streamingBadge.style.display = 'inline-block';
                        cacheButton.disabled = false;
                        cacheButton.innerText = '⏸️ 停止缓存';
                        cacheStatusText.innerText = '流式缓存中';
                        
                        // 读取数据
                        while (isStreaming) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            
                            // 保存chunk用于最后保存完整文件
                            chunks.push(value);
                            receivedLength += value.length;
                            
                            // 更新进度
                            if (totalLength) {
                                const percent = (receivedLength / totalLength * 100).toFixed(1);
                                cacheStatusText.innerText = `缓存中 ${percent}%`;
                                cacheProgressFill.style.width = percent + '%';
                            } else {
                                cacheStatusText.innerText = `已缓存 ${(receivedLength / 1024 / 1024).toFixed(2)} MB`;
                            }
                            
                            // 将数据加入队列或直接追加
                            if (!sourceBuffer.updating) {
                                sourceBuffer.appendBuffer(value);
                            } else {
                                queue.push(value);
                            }
                            
                            // 等待视频播放缓冲
                            await new Promise(resolve => setTimeout(resolve, 10));
                        }
                        
                        // 下载完成
                        if (isStreaming) {
                            // 等待所有队列数据追加完成
                            while (queue.length > 0 || (sourceBuffer && sourceBuffer.updating)) {
                                await new Promise(resolve => setTimeout(resolve, 100));
                            }
                            
                            if (mediaSource.readyState === 'open') {
                                mediaSource.endOfStream();
                            }
                            
                            // 保存完整视频到IndexedDB
                            const completeBlob = new Blob(chunks, { type: 'video/mp4' });
                            await saveCompleteVideo(videoId, completeBlob);
                            
                            cacheStatusText.innerText = '已缓存';
                            cacheProgressFill.style.width = '100%';
                            streamingBadge.style.display = 'none';
                            cacheButton.innerText = '⬇️ 重新缓存';
                            isStreaming = false;
                            
                            console.log('视频完整缓存完成');
                        }
                        
                    } catch (error) {
                        if (error.name === 'AbortError') {
                            console.log('下载被用户中止');
                        } else {
                            console.error('下载出错:', error);
                            cacheStatusText.innerText = '缓存出错';
                        }
                        
                        // 如果下载中断但已经有部分数据，我们可以保留已经追加到MediaSource的部分
                        if (mediaSource.readyState === 'open') {
                            try {
                                mediaSource.endOfStream();
                            } catch (e) {
                                // 忽略
                            }
                        }
                        
                        isStreaming = false;
                        streamingBadge.style.display = 'none';
                        cacheButton.disabled = false;
                        cacheButton.innerText = '⬇️ 重试缓存';
                    }
                    
                } catch (e) {
                    console.error('MediaSource处理出错:', e);
                    isStreaming = false;
                    streamingBadge.style.display = 'none';
                    cacheButton.disabled = false;
                    cacheButton.innerText = '⬇️ 开始缓存';
                }
            });
        }

        // 初始化播放器控制
        playButton.addEventListener("click", function() {
            video.muted = !video.muted;
            
            if (!isFullscreen) {
                enterFullscreen();
            } else {
                exitFullscreen();
            }
            
            updateButtonText();
        });

        // 视频选择器事件
        videoSelector.addEventListener("change", function() {
            changeVideo(this.value);
        });

        // 缓存按钮事件 - 现在启动流式缓存
        cacheButton.addEventListener("click", startStreamingCache);

        function updateButtonText() {
            playButton.textContent = video.muted ? 
                "取消静音并全屏" : 
                "静音并退出全屏";
        }

        function enterFullscreen() {
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen()
                    .then(() => { isFullscreen = true; })
                    .catch(err => console.error("全屏失败: ", err));
            } else if (videoContainer.webkitRequestFullscreen) {
                videoContainer.webkitRequestFullscreen();
                isFullscreen = true;
            }
            
            document.body.classList.add('fullscreen');
        }

        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen()
                    .then(() => { isFullscreen = false; })
                    .catch(err => console.error("退出全屏失败: ", err));
            }
            
            document.body.classList.remove('fullscreen');
        }

        // 监听全屏状态变化
        document.addEventListener('fullscreenchange', () => {
            isFullscreen = !!document.fullscreenElement;
            if (!isFullscreen) {
                document.body.classList.remove('fullscreen');
                updateButtonText();
            }
        });

        // 初始化
        openDB().then(() => {
            videoSelector.value = 'video1';
            changeVideo('video1');
        }).catch(e => {
            console.error('IndexedDB初始化失败，使用普通模式', e);
            changeVideo('video1');
        });

        // 清理
        window.addEventListener('beforeunload', () => {
            if (isStreaming) {
                stopStreaming();
            }
        });
    });
</script>
</body>
</html>
