<!DOCTYPE html>
<html>
<head>
    <title>技术原因边下边看只支持Apple Safari</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        #videoContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #controls {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9999;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            max-width: calc(100vw - 20px);
        }
        button, select {
            background-color: rgba(255,255,255,0.7);
            border: 1px solid #000;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
            backdrop-filter: blur(4px);
        }
        button:hover, select:hover {
            background-color: rgba(255,255,255,0.9);
        }
        .fullscreen #controls {
            display: none;
        }
        .status-bar {
            background-color: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        .progress {
            width: 150px;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #0f0;
            transition: width 0.2s;
        }
        .badge {
            background-color: #ffc107;
            color: #000;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }
    </style>
</head>
<body>
<div id="videoContainer">
    <video id="myVideo" autoplay muted loop playsinline></video>
    <div id="controls">
        <button id="playButton">🔊 取消静音并全屏</button>
        <select id="videoSelector">
            <option value="video1">🎬 视频1</option>
            <option value="video2">🎬 视频2</option>
            <option value="video3">🎬 视频3</option>
        </select>
        <button id="cacheBtn">💾 缓存并边看边存</button>
        <div class="status-bar">
            <span>📥</span>
            <span id="statusText">未缓存</span>
            <div class="progress">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <span id="percentText">0%</span>
            <span id="speedText">0 KB/s</span>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const video = document.getElementById("myVideo");
        const playBtn = document.getElementById("playButton");
        const selector = document.getElementById("videoSelector");
        const container = document.getElementById("videoContainer");
        const cacheBtn = document.getElementById("cacheBtn");
        const statusText = document.getElementById("statusText");
        const progressFill = document.getElementById("progressFill");
        const percentText = document.getElementById("percentText");
        const speedText = document.getElementById("speedText");
        
        let isFullscreen = false;
        let isCaching = false;
        let currentVideoId = "video1";
        let currentVideoUrl = "";
        let currentBlobUrl = null;
        
        // 视频配置
        const videos = {
            video1: { url: "https://adminshater.github.io/ytf/1.mp4", name: "视频1" },
            video2: { url: "https://adminshater.github.io/ytf/2.mp4", name: "视频2" },
            video3: { url: "https://adminshater.github.io/ytf/3.mp4", name: "视频3" }
        };
        
        // IndexedDB 存储
        const DB_NAME = "MP4Cache";
        let db = null;
        
        function initDB() {
            return new Promise((resolve, reject) => {
                if (db) { resolve(db); return; }
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("videos")) {
                        db.createObjectStore("videos", { keyPath: "id" });
                    }
                };
            });
        }
        
        async function getCache(videoId) {
            await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction(["videos"], "readonly");
                const store = tx.objectStore("videos");
                const request = store.get(videoId);
                request.onsuccess = () => resolve(request.result?.blob || null);
                request.onerror = () => resolve(null);
            });
        }
        
        async function saveCache(videoId, blob) {
            await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(["videos"], "readwrite");
                const store = tx.objectStore("videos");
                const request = store.put({ id: videoId, blob, time: Date.now() });
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }
        
        // 播放视频
        async function playVideo(videoId) {
            currentVideoId = videoId;
            currentVideoUrl = videos[videoId].url;
            
            // 清理旧 blob URL
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
            
            // 检查缓存
            const cached = await getCache(videoId);
            
            if (cached) {
                currentBlobUrl = URL.createObjectURL(cached);
                video.src = currentBlobUrl;
                statusText.innerText = "✓ 已缓存";
                progressFill.style.width = "100%";
                percentText.innerText = "100%";
            } else {
                video.src = currentVideoUrl;
                statusText.innerText = "🌐 未缓存";
                progressFill.style.width = "0%";
                percentText.innerText = "0%";
            }
            
            video.load();
            video.play().catch(e => console.log("需要用户交互"));
        }
        
        // 边下边播缓存（使用 MediaSource）
        async function cacheWithStreaming() {
            if (isCaching) {
                alert("正在缓存中，请稍后...");
                return;
            }
            
            const videoId = currentVideoId;
            const videoUrl = currentVideoUrl;
            
            const existing = await getCache(videoId);
            if (existing && !confirm("视频已缓存，是否重新缓存？")) {
                return;
            }
            
            isCaching = true;
            cacheBtn.disabled = true;
            cacheBtn.textContent = "⏳ 缓存中...";
            statusText.innerText = "📥 下载中";
            
            try {
                // 发起请求获取视频
                const response = await fetch(videoUrl);
                if (!response.ok) throw new Error("下载失败");
                
                const contentLength = parseInt(response.headers.get("content-length") || "0");
                const reader = response.body.getReader();
                const chunks = [];
                let received = 0;
                let lastTime = Date.now();
                let lastBytes = 0;
                
                // 创建 MediaSource 实现边下边播
                const mediaSource = new MediaSource();
                const blobUrl = URL.createObjectURL(mediaSource);
                
                // 清理旧 blob URL
                if (currentBlobUrl && currentBlobUrl !== video.src) {
                    URL.revokeObjectURL(currentBlobUrl);
                }
                currentBlobUrl = blobUrl;
                video.src = blobUrl;
                
                let sourceBuffer = null;
                let bufferQueue = [];
                let isAppending = false;
                
                mediaSource.addEventListener("sourceopen", async () => {
                    try {
                        // 添加 SourceBuffer（MP4 格式）
                        sourceBuffer = mediaSource.addSourceBuffer('video/mp4');
                        sourceBuffer.mode = 'sequence';
                        
                        sourceBuffer.addEventListener("updateend", () => {
                            isAppending = false;
                            if (bufferQueue.length > 0) {
                                const next = bufferQueue.shift();
                                appendToBuffer(next);
                            }
                        });
                        
                        function appendToBuffer(data) {
                            if (!sourceBuffer || sourceBuffer.updating || !data) return;
                            try {
                                isAppending = true;
                                sourceBuffer.appendBuffer(data);
                            } catch (e) {
                                console.error("追加失败:", e);
                                isAppending = false;
                            }
                        }
                        
                        // 读取数据流
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            
                            chunks.push(value);
                            received += value.length;
                            
                            // 更新进度
                            if (contentLength > 0) {
                                const percent = (received / contentLength * 100).toFixed(1);
                                progressFill.style.width = percent + "%";
                                percentText.innerText = percent + "%";
                                statusText.innerText = `📥 ${percent}%`;
                            }
                            
                            // 计算速度
                            const now = Date.now();
                            if (now - lastTime >= 1000) {
                                const speed = (received - lastBytes) / 1024;
                                speedText.innerText = speed.toFixed(1) + " KB/s";
                                lastBytes = received;
                                lastTime = now;
                            }
                            
                            // 边下边播：将数据加入缓冲队列
                            if (sourceBuffer && !sourceBuffer.updating) {
                                appendToBuffer(value);
                            } else if (sourceBuffer) {
                                bufferQueue.push(value);
                            }
                        }
                        
                        // 等待队列清空
                        while (bufferQueue.length > 0 && sourceBuffer && sourceBuffer.updating) {
                            await new Promise(r => setTimeout(r, 100));
                        }
                        
                        // 结束流
                        if (mediaSource.readyState === "open") {
                            mediaSource.endOfStream();
                        }
                        
                        // 保存完整视频到缓存
                        const completeBlob = new Blob(chunks, { type: "video/mp4" });
                        await saveCache(videoId, completeBlob);
                        
                        statusText.innerText = "✓ 已缓存";
                        progressFill.style.width = "100%";
                        percentText.innerText = "100%";
                        speedText.innerText = "完成";
                        
                        alert("✓ 缓存完成！下次播放将使用本地缓存");
                        
                    } catch (e) {
                        console.error("MediaSource 错误:", e);
                        // 降级：先下载完再播放
                        const completeBlob = new Blob(chunks, { type: "video/mp4" });
                        const fallbackUrl = URL.createObjectURL(completeBlob);
                        video.src = fallbackUrl;
                        await saveCache(videoId, completeBlob);
                        statusText.innerText = "✓ 已缓存";
                        alert("✓ 缓存完成（降级模式）");
                    }
                });
                
            } catch (error) {
                console.error("缓存失败:", error);
                statusText.innerText = "❌ 失败";
                alert("缓存失败: " + error.message);
            } finally {
                isCaching = false;
                cacheBtn.disabled = false;
                cacheBtn.textContent = "💾 缓存并边看边存";
            }
        }
        
        // 切换视频
        selector.addEventListener("change", async (e) => {
            if (isCaching && !confirm("切换将取消缓存，确定吗？")) {
                selector.value = currentVideoId;
                return;
            }
            await playVideo(e.target.value);
        });
        
        // 缓存按钮
        cacheBtn.addEventListener("click", cacheWithStreaming);
        
        // 全屏静音
        playBtn.addEventListener("click", () => {
            video.muted = !video.muted;
            if (!isFullscreen) {
                container.requestFullscreen?.();
                isFullscreen = true;
            } else {
                document.exitFullscreen?.();
                isFullscreen = false;
            }
            playBtn.textContent = video.muted ? "🔇 取消静音并全屏" : "🔊 静音并退出全屏";
        });
        
        document.addEventListener("fullscreenchange", () => {
            isFullscreen = !!document.fullscreenElement;
            if (!isFullscreen) {
                playBtn.textContent = video.muted ? "🔇 取消静音并全屏" : "🔊 静音并退出全屏";
            }
        });
        
        // 启动
        initDB().then(() => {
            playVideo("video1");
        }).catch(e => {
            console.error("数据库失败:", e);
            playVideo("video1");
        });
    });
</script>
</body>
</html>
