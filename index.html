<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>(╯°□°）╯︵ ┻━┻ 缓存不可用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c10;
            overflow: hidden;
            font-family: system-ui, 'Segoe UI', 'SF Pro Text', 'Roboto', sans-serif;
        }

        .video-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            cursor: pointer;
        }

        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            background: rgba(20, 22, 27, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            transition: opacity 0.3s ease;
            pointer-events: auto;
        }

        .fullscreen-mode .controls-panel {
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        
        .fullscreen-mode .controls-panel:hover,
        .fullscreen-mode .controls-panel:focus-within {
            opacity: 1;
            pointer-events: auto;
        }

        button, select {
            background: rgba(0, 0, 0, 0.75);
            border: none;
            color: #f0f0f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            font-family: inherit;
            border: 1px solid rgba(255,255,255,0.15);
        }

        button:hover:not(:disabled), select:hover {
            background: #2c2f36;
            transform: scale(0.97);
            border-color: rgba(255,255,255,0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        select {
            background: #1e2127;
            cursor: pointer;
            appearance: none;
            padding-right: 32px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        .status-bar {
            background: #0f1117cc;
            border-radius: 40px;
            padding: 5px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            color: #b9f6ca;
            backdrop-filter: blur(4px);
            border: 1px solid #2a2e3a;
        }

        .progress {
            width: 140px;
            height: 6px;
            background: #2a2f3a;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3eff9e, #00d8ff);
            border-radius: 6px;
            transition: width 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .speed-badge {
            background: #2c2f36;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            color: #aaf0c0;
        }

        .error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 53, 69, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 10000;
            backdrop-filter: blur(8px);
            animation: slideDown 0.3s ease;
            pointer-events: none;
        }

        @keyframes slideDown {
            from {
                top: -50px;
                opacity: 0;
            }
            to {
                top: 20px;
                opacity: 1;
            }
        }

        @media (max-width: 720px) {
            .controls-panel {
                padding: 8px 12px;
                gap: 8px;
                border-radius: 32px;
            }
            button, select {
                padding: 6px 12px;
                font-size: 12px;
            }
            .status-bar {
                padding: 3px 12px;
                gap: 6px;
            }
            .progress {
                width: 90px;
            }
        }
    </style>
</head>
<body>
<div class="video-wrapper" id="videoWrapper">
    <video id="myVideo" autoplay muted loop playsinline preload="metadata" crossorigin="anonymous"></video>
    <div class="controls-panel" id="controlsPanel">
        <button id="fullscreenBtn">🖥️ 全屏</button>
        <button id="toggleMuteBtn">🔊 静音</button>
        <select id="videoSelector">
            <option value="video1">🎬 视频1</option>
            <option value="video2">🎬 视频2</option>
            <option value="video3">🎬 视频3</option>
        </select>
        <button id="cacheBtn">💾 缓存视频</button>
        <div class="status-bar">
            <span>📡</span>
            <span id="statusText">未缓存</span>
            <div class="progress">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <span id="percentText">0%</span>
            <span id="speedText" class="speed-badge">0 KB/s</span>
        </div>
    </div>
</div>

<script>
    (function() {
        // DOM 元素
        const video = document.getElementById("myVideo");
        const fullscreenBtn = document.getElementById("fullscreenBtn");
        const toggleMuteBtn = document.getElementById("toggleMuteBtn");
        const selector = document.getElementById("videoSelector");
        const wrapper = document.getElementById("videoWrapper");
        const cacheBtn = document.getElementById("cacheBtn");
        const statusText = document.getElementById("statusText");
        const progressFill = document.getElementById("progressFill");
        const percentText = document.getElementById("percentText");
        const speedText = document.getElementById("speedText");
        
        // 状态变量
        let isFullscreen = false;
        let isCaching = false;
        let currentVideoId = "video1";
        let currentVideoUrl = "";
        let currentBlobUrl = null;
        let abortController = null;
        
        // 视频配置 - 使用更可靠的测试视频源
        const videos = {
            video1: { 
                url: "https://adminshater.github.io/ytf/1.mp4",
                name: "视频1"
            },
            video2: { 
                url: "https://adminshater.github.io/ytf/2.mp4",
                name: "视频2"
            },
            video3: { 
                url: "https://adminshater.github.io/ytf/3.mp4",
                name: "视频3"
            }
        };
        
        // IndexedDB 存储
        const DB_NAME = "VideoCacheDB";
        const DB_VERSION = 2;
        let db = null;
        
        // 显示错误提示
        function showError(message) {
            const toast = document.createElement('div');
            toast.className = 'error-toast';
            toast.textContent = `⚠️ ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // 初始化 IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                if (db && db.name === DB_NAME) {
                    resolve(db);
                    return;
                }
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (e) => {
                    const dbInstance = e.target.result;
                    if (!dbInstance.objectStoreNames.contains("videoCache")) {
                        const store = dbInstance.createObjectStore("videoCache", { keyPath: "id" });
                        store.createIndex("timestamp", "timestamp");
                    }
                };
            });
        }
        
        // 获取缓存
        async function getCachedVideo(videoId) {
            try {
                await initDB();
                return new Promise((resolve) => {
                    const tx = db.transaction(["videoCache"], "readonly");
                    const store = tx.objectStore("videoCache");
                    const request = store.get(videoId);
                    request.onsuccess = () => {
                        const result = request.result;
                        if (result && result.blob) {
                            resolve(result.blob);
                        } else {
                            resolve(null);
                        }
                    };
                    request.onerror = () => resolve(null);
                });
            } catch (error) {
                console.warn("读取缓存失败:", error);
                return null;
            }
        }
        
        // 保存缓存
        async function saveCachedVideo(videoId, blob) {
            try {
                await initDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(["videoCache"], "readwrite");
                    const store = tx.objectStore("videoCache");
                    const record = {
                        id: videoId,
                        blob: blob,
                        timestamp: Date.now(),
                        size: blob.size
                    };
                    const request = store.put(record);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            } catch (error) {
                console.error("保存缓存失败:", error);
                throw error;
            }
        }
        
        // 播放视频（优先使用缓存）
        async function playVideo(videoId) {
            if (isCaching && abortController) {
                abortController.abort();
                isCaching = false;
                cacheBtn.disabled = false;
                cacheBtn.textContent = "💾 缓存视频";
            }
            
            currentVideoId = videoId;
            currentVideoUrl = videos[videoId].url;
            
            // 清理旧 blob URL
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
            
            // 检查缓存
            const cachedBlob = await getCachedVideo(videoId);
            if (cachedBlob) {
                try {
                    currentBlobUrl = URL.createObjectURL(cachedBlob);
                    video.src = currentBlobUrl;
                    statusText.innerText = "✓ 已缓存";
                    progressFill.style.width = "100%";
                    percentText.innerText = "100%";
                    speedText.innerText = "本地";
                    video.load();
                    video.play().catch(e => console.log("自动播放需要交互"));
                    return;
                } catch (error) {
                    console.warn("使用缓存失败:", error);
                }
            }
            
            // 无缓存，使用在线播放
            video.src = currentVideoUrl;
            statusText.innerText = "🌐 在线";
            progressFill.style.width = "0%";
            percentText.innerText = "0%";
            speedText.innerText = "0 KB/s";
            video.load();
            video.play().catch(e => console.log("自动播放需要交互"));
        }
        
        // 使用 fetch + Blob 方式缓存（兼容性最好）
        async function cacheVideoSimple() {
            if (isCaching) {
                showError("正在缓存中，请稍后");
                return;
            }
            
            const videoId = currentVideoId;
            const videoUrl = currentVideoUrl;
            const videoName = videos[videoId].name;
            
            // 检查是否已缓存
            const existing = await getCachedVideo(videoId);
            if (existing) {
                const confirm = window.confirm(`视频「${videoName}」已缓存，是否重新缓存？`);
                if (!confirm) return;
            }
            
            isCaching = true;
            cacheBtn.disabled = true;
            cacheBtn.textContent = "⏳ 下载中...";
            statusText.innerText = "📥 开始下载";
            progressFill.style.width = "0%";
            percentText.innerText = "0%";
            
            abortController = new AbortController();
            let lastTime = Date.now();
            let lastBytes = 0;
            
            try {
                // 发起请求（带超时和重试）
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000); // 60秒超时
                
                const response = await fetch(videoUrl, {
                    signal: controller.signal,
                    mode: 'cors',
                    credentials: 'omit'
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const contentLength = parseInt(response.headers.get("content-length") || "0");
                const reader = response.body.getReader();
                const chunks = [];
                let receivedLength = 0;
                
                statusText.innerText = "📥 下载中";
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    chunks.push(value);
                    receivedLength += value.length;
                    
                    // 更新进度
                    if (contentLength > 0) {
                        const percent = (receivedLength / contentLength * 100).toFixed(1);
                        progressFill.style.width = percent + "%";
                        percentText.innerText = percent + "%";
                        statusText.innerText = `📥 ${percent}%`;
                    } else {
                        const mb = (receivedLength / 1024 / 1024).toFixed(1);
                        statusText.innerText = `📥 ${mb} MB`;
                        percentText.innerText = `${mb}MB`;
                    }
                    
                    // 计算下载速度
                    const now = Date.now();
                    if (now - lastTime >= 1000) {
                        const speed = (receivedLength - lastBytes) / 1024;
                        speedText.innerText = speed.toFixed(1) + " KB/s";
                        lastBytes = receivedLength;
                        lastTime = now;
                    }
                }
                
                // 合并所有数据块
                const blob = new Blob(chunks, { type: "video/mp4" });
                
                // 保存到 IndexedDB
                statusText.innerText = "💾 保存中...";
                await saveCachedVideo(videoId, blob);
                
                // 更新 UI
                statusText.innerText = "✓ 缓存完成";
                progressFill.style.width = "100%";
                percentText.innerText = "100%";
                speedText.innerText = "完成";
                
                // 如果当前播放的视频就是这个，询问是否切换到缓存版本
                if (currentVideoId === videoId) {
                    const useCache = confirm(`✅ 缓存完成！\n文件大小: ${(blob.size / 1024 / 1024).toFixed(1)} MB\n是否切换到缓存版本播放？`);
                    if (useCache) {
                        if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                        currentBlobUrl = URL.createObjectURL(blob);
                        video.src = currentBlobUrl;
                        video.load();
                        video.play().catch(e => console.log("播放失败"));
                    }
                }
                
                showError(`✓ 缓存成功！视频大小: ${(blob.size / 1024 / 1024).toFixed(1)} MB`);
                
            } catch (error) {
                console.error("缓存失败:", error);
                
                let errorMsg = "缓存失败";
                if (error.name === 'AbortError') {
                    errorMsg = "下载超时，请检查网络";
                } else if (error.message.includes("Failed to fetch")) {
                    errorMsg = "网络请求失败，可能是跨域或Cloudflare限制";
                } else if (error.message.includes("HTTP")) {
                    errorMsg = error.message;
                } else {
                    errorMsg = error.message || "未知错误";
                }
                
                statusText.innerText = "❌ 失败";
                showError(`${errorMsg}，请重试或检查网络`);
                
                // 恢复在线播放
                if (currentVideoId === videoId) {
                    video.src = currentVideoUrl;
                    video.load();
                }
            } finally {
                isCaching = false;
                cacheBtn.disabled = false;
                cacheBtn.textContent = "💾 缓存视频";
                abortController = null;
                
                // 3秒后恢复状态显示
                setTimeout(async () => {
                    if (!isCaching) {
                        const cached = await getCachedVideo(currentVideoId);
                        if (cached) {
                            statusText.innerText = "✓ 已缓存";
                            progressFill.style.width = "100%";
                            percentText.innerText = "100%";
                        } else if (video.src === currentVideoUrl) {
                            statusText.innerText = "🌐 在线";
                        }
                    }
                }, 2000);
            }
        }
        
        // 使用 MediaSource 边下边播（高级模式，可能受 Cloudflare 影响）
        async function cacheVideoStreaming() {
            showError("流式缓存可能受限，使用标准缓存模式");
            await cacheVideoSimple();
        }
        
        // 缓存入口（自动选择最佳模式）
        async function startCache() {
            // 优先使用简单 fetch 模式，兼容性最好
            await cacheVideoSimple();
        }
        
        // 全屏功能
        function toggleFullscreen() {
            if (!document.fullscreenElement && !wrapper.webkitFullscreenElement) {
                wrapper.requestFullscreen().catch(err => {
                    console.warn(`全屏失败: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        // 静音切换
        function toggleMute() {
            video.muted = !video.muted;
            updateMuteButtonUI();
        }
        
        function updateMuteButtonUI() {
            if (video.muted) {
                toggleMuteBtn.innerHTML = "🔇 取消静音";
                toggleMuteBtn.style.background = "#a03e3e";
            } else {
                toggleMuteBtn.innerHTML = "🔊 静音";
                toggleMuteBtn.style.background = "#2a7f3e";
            }
        }
        
        // 全屏状态监听
        function onFullscreenChange() {
            const isFs = !!document.fullscreenElement || !!wrapper.webkitFullscreenElement;
            isFullscreen = isFs;
            if (isFs) {
                wrapper.classList.add("fullscreen-mode");
                fullscreenBtn.innerHTML = "📱 窗口";
            } else {
                wrapper.classList.remove("fullscreen-mode");
                fullscreenBtn.innerHTML = "🖥️ 全屏";
            }
        }
        
        // 事件绑定
        selector.addEventListener("change", async (e) => {
            if (isCaching) {
                const confirm = window.confirm("缓存进行中，切换会中断缓存，确定吗？");
                if (!confirm) {
                    selector.value = currentVideoId;
                    return;
                }
                if (abortController) {
                    abortController.abort();
                }
                isCaching = false;
                cacheBtn.disabled = false;
                cacheBtn.textContent = "💾 缓存视频";
            }
            await playVideo(e.target.value);
        });
        
        cacheBtn.addEventListener("click", startCache);
        fullscreenBtn.addEventListener("click", toggleFullscreen);
        toggleMuteBtn.addEventListener("click", toggleMute);
        
        document.addEventListener("fullscreenchange", onFullscreenChange);
        document.addEventListener("webkitfullscreenchange", onFullscreenChange);
        
        // 点击视频可取消静音
        video.addEventListener("click", () => {
            if (video.muted) {
                video.muted = false;
                updateMuteButtonUI();
            }
        });
        
        // 视频加载错误处理
        video.addEventListener("error", (e) => {
            const error = video.error;
            if (error) {
                let errorMsg = "";
                switch(error.code) {
                    case 1: errorMsg = "视频加载中止"; break;
                    case 2: errorMsg = "网络错误，请检查连接"; break;
                    case 3: errorMsg = "视频解码失败"; break;
                    case 4: errorMsg = "视频格式不支持"; break;
                    default: errorMsg = "未知错误";
                }
                console.error("视频错误:", errorMsg);
                
                // 如果当前是在线播放且不是缓存模式，尝试使用备用源
                if (!currentBlobUrl && videos[currentVideoId] && videos[currentVideoId].fallback) {
                    console.log("尝试使用备用视频源");
                    video.src = videos[currentVideoId].fallback;
                    video.load();
                }
            }
        });
        
        // 初始化
        async function init() {
            try {
                await initDB();
                console.log("IndexedDB 初始化成功");
            } catch (error) {
                console.warn("IndexedDB 不可用，将使用在线模式", error);
                showError("本地存储不可用，将使用在线播放");
            }
            
            await playVideo("video1");
            updateMuteButtonUI();
        }
        
        init();
        
        // 清理 blob URL
        window.addEventListener("beforeunload", () => {
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
            }
        });
    })();
</script>
</body>
</html>
